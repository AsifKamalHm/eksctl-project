name: Kubernets CI

on:
  push:
    branches: [ "main" ]


jobs:

  pyapp-ci:

    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: "docker build -t asif21gm/pyapp:${GITHUB_SHA::7} ."
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Push Docker image to docker hub
      run: "docker push asif21gm/pyapp:${GITHUB_SHA::7}"
    - name: install yq yml editor
      run: |
        wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq &&\
        chmod +x /usr/local/bin/yq
    - name: update the Deployment file to the latest docker image
      run: |
          SHORT_SHA=${GITHUB_SHA::7}
          yq -i ".spec.template.spec.containers[0].image = \"asif21gm/pyapp:$SHORT_SHA\"" ./k8s/pyapp-dep.yml
    - name: commit changes to docker hub
      run: |
        git config user.name "github-action@[bot]"
        git config user.email "github-action@noreply"
        git add k8s/pyapp-dep.yml
        git commit -m 'docker tag update by GHA'
        git push origin main
        
        
